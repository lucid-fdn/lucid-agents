name: openclaw
display_name: "OpenClaw Personal Assistant"
description: "Autonomous personal AI — 22+ channels, 53+ skills (auto-discovered), web search, voice. One command to deploy."
version: "1.0.0"
author: "Lucid Foundation"
license: "Apache-2.0"
trust_tier: official
image: ghcr.io/lucid-fdn/lucid-agents/openclaw:latest
defaults:
  model: anthropic/claude-opus-4-6
  port: 18789

required_env:
  - name: ANTHROPIC_API_KEY
    description: "Claude API key (console.anthropic.com/settings/keys)"

optional_env:
  - name: OPENCLAW_MODEL
    description: "LLM model (anthropic/claude-opus-4-6, openai/gpt-4o, etc.)"
    default: "anthropic/claude-opus-4-6"
  - name: OPENAI_API_KEY
    description: "OpenAI key (alternative to Anthropic)"
  - name: TELEGRAM_BOT_TOKEN
    description: "Telegram bot token (@BotFather → /newbot)"
  - name: DISCORD_BOT_TOKEN
    description: "Discord bot token (discord.com/developers)"
  - name: SLACK_BOT_TOKEN
    description: "Slack bot token (xoxb-...)"
  - name: SLACK_APP_TOKEN
    description: "Slack app token for Socket Mode (xapp-...)"
  - name: SLACK_SIGNING_SECRET
    description: "Slack signing secret"
  - name: BRAVE_API_KEY
    description: "Brave Search API (brave.com/search/api)"
  - name: ELEVENLABS_API_KEY
    description: "ElevenLabs voice/TTS (elevenlabs.io)"
  - name: OPENCLAW_TZ
    description: "Agent timezone"
    default: "UTC"

# Skills are auto-discovered from the Docker image at launch time.
# Bundled skills are always installed. Optional skills shown to user.
# Manifest only declares metadata for skills that need env vars.
skills_enabled: true
skills:
  bundled:
    - weather
    - summarize
    - healthcheck
    - session-logs
    - model-usage
    - clawhub
    - skill-creator
  # Metadata for skills requiring API keys (auto-discovered skills without entries here just show slug name)
  optional:
    - slug: github
      display_name: "GitHub"
      description: "Issues, PRs, CI runs, code review via gh CLI"
      env: GITHUB_TOKEN
      env_description: "GitHub personal access token"
    - slug: gh-issues
      display_name: "GitHub Issues Bot"
      description: "Auto-fetch issues, spawn agents to fix, open PRs"
      env: GITHUB_TOKEN
      env_description: "GitHub personal access token"
    - slug: firecrawl
      display_name: "Web Scraping"
      description: "Crawl and scrape websites at scale"
      env: FIRECRAWL_API_KEY
      env_description: "Firecrawl API key (firecrawl.dev)"
    - slug: openai-image-gen
      display_name: "Image Generation"
      description: "Generate images via OpenAI API"
      env: OPENAI_API_KEY
      env_description: "OpenAI API key"
    - slug: openai-whisper-api
      display_name: "Speech-to-Text (Cloud)"
      description: "Transcribe audio via OpenAI Whisper API"
      env: OPENAI_API_KEY
      env_description: "OpenAI API key"
    - slug: voice-call
      display_name: "Voice Calls"
      description: "Start voice calls via OpenClaw"
      env: ELEVENLABS_API_KEY
      env_description: "ElevenLabs API key"
    - slug: sag
      display_name: "Text-to-Speech (Cloud)"
      description: "ElevenLabs TTS"
      env: ELEVENLABS_API_KEY
      env_description: "ElevenLabs API key"

resources:
  gpu: false
  memory: "512Mi"

categories:
  - assistant
  - messaging
  - personal
  - voice
  - search
