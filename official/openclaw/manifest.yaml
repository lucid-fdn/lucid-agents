name: openclaw
display_name: "OpenClaw Personal Assistant"
description: "Personal AI assistant with 22+ messaging channels, 53 skills, web search, voice. One command to deploy."
version: "1.0.0"
author: "Lucid Foundation"
license: "Apache-2.0"
trust_tier: official
image: ghcr.io/lucid-fdn/lucid-agents/openclaw:latest
defaults:
  model: anthropic/claude-opus-4-6
  port: 18789

required_env:
  - name: ANTHROPIC_API_KEY
    description: "Claude API key (console.anthropic.com/settings/keys)"

optional_env:
  # LLM Provider
  - name: OPENCLAW_MODEL
    description: "LLM model (anthropic/claude-opus-4-6, openai/gpt-4o, etc.)"
    default: "anthropic/claude-opus-4-6"
  - name: OPENAI_API_KEY
    description: "OpenAI key (alternative to Anthropic)"

  # Messaging Channels
  - name: TELEGRAM_BOT_TOKEN
    description: "Telegram bot token (create via @BotFather → /newbot)"
  - name: DISCORD_BOT_TOKEN
    description: "Discord bot token (discord.com/developers/applications)"
  - name: SLACK_BOT_TOKEN
    description: "Slack bot token (xoxb-...)"
  - name: SLACK_APP_TOKEN
    description: "Slack app token for Socket Mode (xapp-...)"
  - name: SLACK_SIGNING_SECRET
    description: "Slack signing secret (for HTTP mode, if no app token)"

  # Tools & Capabilities
  - name: BRAVE_API_KEY
    description: "Brave Search API key — enables web search tool (brave.com/search/api)"
  - name: ELEVENLABS_API_KEY
    description: "ElevenLabs API key — enables voice/TTS responses (elevenlabs.io)"

  # Preferences
  - name: OPENCLAW_TZ
    description: "Agent timezone"
    default: "UTC"

skills:
  bundled:
    - weather
    - summarize
    - healthcheck
    - session-logs
    - model-usage
  optional:
    # Productivity
    - slug: coding-agent
      display_name: "Coding Agent"
      description: "Write, review, and debug code"
    - slug: github
      display_name: "GitHub"
      description: "Read/write repos, issues, PRs"
      env: GITHUB_TOKEN
      env_description: "GitHub personal access token"
    - slug: gh-issues
      display_name: "GitHub Issues"
      description: "Browse and manage GitHub issues"
      env: GITHUB_TOKEN
      env_description: "GitHub personal access token"
    - slug: trello
      display_name: "Trello"
      description: "Manage Trello boards, lists, and cards"
    - slug: notion
      display_name: "Notion"
      description: "Read/write Notion pages and databases"
    # Web & Research
    - slug: browser
      display_name: "Browser Automation"
      description: "Navigate, click, extract from web pages"
    - slug: firecrawl
      display_name: "Web Scraping"
      description: "Crawl and scrape websites at scale"
      env: FIRECRAWL_API_KEY
      env_description: "Firecrawl API key (firecrawl.dev)"
    - slug: xurl
      display_name: "URL Fetcher"
      description: "Fetch and parse web page content"
    - slug: nano-pdf
      display_name: "PDF Processing"
      description: "Read, extract, and analyze PDF files"
    - slug: blogwatcher
      display_name: "Blog Watcher"
      description: "Monitor blogs and RSS feeds for updates"
    # Media & Creative
    - slug: openai-image-gen
      display_name: "Image Generation"
      description: "Generate images with AI (DALL-E / GPT)"
      env: OPENAI_API_KEY
      env_description: "OpenAI API key"
    - slug: gemini
      display_name: "Gemini Vision"
      description: "Analyze images and visual content with Gemini"
    - slug: video-frames
      display_name: "Video Analysis"
      description: "Extract and analyze frames from video"
    - slug: gifgrep
      display_name: "GIF Search"
      description: "Search and send GIFs"
    # Voice & Audio
    - slug: voice-call
      display_name: "Voice Calls"
      description: "Make and receive voice calls"
      env: ELEVENLABS_API_KEY
      env_description: "ElevenLabs API key"
    - slug: openai-whisper
      display_name: "Speech-to-Text"
      description: "Transcribe audio with Whisper"
      env: OPENAI_API_KEY
      env_description: "OpenAI API key"
    - slug: sonoscli
      display_name: "Sonos Control"
      description: "Control Sonos speakers"
    - slug: spotify-player
      display_name: "Spotify"
      description: "Control Spotify playback"
    # Smart Home & IoT
    - slug: openhue
      display_name: "Philips Hue"
      description: "Control smart lights"
    - slug: camsnap
      display_name: "Camera Capture"
      description: "Capture images from connected cameras"
    # Communication
    - slug: slack
      display_name: "Slack Tools"
      description: "Advanced Slack workspace operations"
    - slug: discord
      display_name: "Discord Tools"
      description: "Advanced Discord server operations"
    - slug: himalaya
      display_name: "Email (IMAP)"
      description: "Read and send email via IMAP"
    # Dev & System
    - slug: tmux
      display_name: "Terminal Multiplexer"
      description: "Manage tmux sessions and windows"
    - slug: skill-creator
      display_name: "Skill Creator"
      description: "Create new OpenClaw skills interactively"
    - slug: mcporter
      display_name: "MCP Bridge"
      description: "Connect to external MCP tool servers"

resources:
  gpu: false
  memory: "512Mi"

categories:
  - assistant
  - messaging
  - personal
  - voice
  - search
