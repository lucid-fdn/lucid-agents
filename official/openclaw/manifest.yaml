name: openclaw
display_name: "OpenClaw Personal Assistant"
description: "Personal AI assistant with 22+ messaging channel support. Set your API key — one command to deploy."
version: "1.0.0"
author: "Lucid Foundation"
license: "Apache-2.0"
trust_tier: official
image: ghcr.io/lucid-fdn/lucid-agents/openclaw:latest
defaults:
  model: anthropic/claude-opus-4-6
  port: 18789
required_env:
  - name: ANTHROPIC_API_KEY
    description: "Claude API key (console.anthropic.com/settings/keys)"
optional_env:
  - name: OPENCLAW_MODEL
    description: "LLM model"
    default: "anthropic/claude-opus-4-6"
  - name: OPENAI_API_KEY
    description: "OpenAI API key (alternative to Anthropic)"
resources:
  gpu: false
  memory: "512Mi"
categories:
  - assistant
  - messaging
  - personal
