name: Rebuild OpenClaw Image
on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday 6 AM UTC
  workflow_dispatch:       # Manual trigger

jobs:
  check-and-rebuild:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Check latest npm version
        id: version
        run: |
          LATEST=$(npm view openclaw version 2>/dev/null || echo "0.0.0")
          echo "latest=$LATEST" >> $GITHUB_OUTPUT
          # Check if we already built this version
          BUILT=$(cat official/openclaw/.built-version 2>/dev/null || echo "none")
          echo "built=$BUILT" >> $GITHUB_OUTPUT
          if [ "$LATEST" = "$BUILT" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Login to GHCR
        if: steps.version.outputs.skip == 'false'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: steps.version.outputs.skip == 'false'
        run: |
          VERSION=${{ steps.version.outputs.latest }}
          echo "Building OpenClaw $VERSION"
          docker build -t ghcr.io/lucid-fdn/lucid-agents/openclaw:v$VERSION official/openclaw/
          docker tag ghcr.io/lucid-fdn/lucid-agents/openclaw:v$VERSION ghcr.io/lucid-fdn/lucid-agents/openclaw:latest
          docker push ghcr.io/lucid-fdn/lucid-agents/openclaw:v$VERSION
          docker push ghcr.io/lucid-fdn/lucid-agents/openclaw:latest

      - name: Update built version + manifest
        if: steps.version.outputs.skip == 'false'
        run: |
          VERSION=${{ steps.version.outputs.latest }}
          echo "$VERSION" > official/openclaw/.built-version
          # Update manifest image tag
          sed -i "s|image: ghcr.io/lucid-fdn/lucid-agents/openclaw:.*|image: ghcr.io/lucid-fdn/lucid-agents/openclaw:v$VERSION|" official/openclaw/manifest.yaml
          # Update catalog
          node -e "
            const fs = require('fs');
            const cat = JSON.parse(fs.readFileSync('catalog.json'));
            const oc = cat.agents.find(a => a.name === 'openclaw');
            if (oc) { oc.version = '$VERSION'; oc.image = 'ghcr.io/lucid-fdn/lucid-agents/openclaw:v$VERSION'; }
            cat.generated_at = new Date().toISOString();
            fs.writeFileSync('catalog.json', JSON.stringify(cat, null, 2));
          "

      - name: Commit updates
        if: steps.version.outputs.skip == 'false'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add official/openclaw/.built-version official/openclaw/manifest.yaml catalog.json
          git diff --cached --quiet || git commit -m "chore(openclaw): rebuild v${{ steps.version.outputs.latest }}"
          git push
